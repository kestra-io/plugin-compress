group: io.kestra.plugin.compress
name: "compress"
title: "Compression"
description: "Tasks that compress and decompress files and archives for Kestra flows."
body: "Use ArchiveCompress, ArchiveDecompress, FileCompress, and FileDecompress to package or extract files stored in Kestra, providing the `from` internal storage URI plus an `algorithm` for archives and a `compression` format for both archive and single-file operations. Use FileEncrypt and FileDecrypt to encrypt and decrypt files with AES-256-CBC and PBKDF2-HMAC-SHA256 key derivation, compatible with `openssl enc -aes-256-cbc -pbkdf2`. Outputs return new storage URIs (archives also expose an entry map and size/count metrics), making it easy to pass compressed or encrypted artifacts to uploads or downstream tasks."
