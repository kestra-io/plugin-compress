id: all_compress
namespace: sanitychecks.plugin-compress

tasks:
  - id: for_each
    type: io.kestra.plugin.core.flow.Loop
    values:
      - archive
    tasks:
      - id: subflow
        type: io.kestra.plugin.core.flow.Subflow
        flowId: "{{item.value}}"
        namespace: "{{ flow.namespace }}"
        